  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0a0a0f; color: #e8e8f0; font-family: 'Outfit', sans-serif;
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
      padding-top: env(safe-area-inset-top);
    }
    input, select, textarea { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes countPulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    @keyframes ringGlow { 0%,100% { filter: drop-shadow(0 0 12px var(--glow-color, rgba(0,229,255,0.25))); } 50% { filter: drop-shadow(0 0 25px var(--glow-color, rgba(0,229,255,0.25))); } }
    @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes pbFlash { 0% { transform: scale(0.8); opacity: 0; } 20% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes goldShine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pbGlow { 0%,100% { box-shadow: 0 0 20px rgba(255,200,80,0.15); } 50% { box-shadow: 0 0 40px rgba(255,200,80,0.3); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .slide-up { animation: slideUp 0.4s ease-out; }
  </style>

      { phrase: "row", group: "back" },
      { phrase: "pull", group: "back" },
      { phrase: "lat", group: "back" },
      { phrase: "press", group: "chest" },
      { phrase: "crunch", group: "core" },
      { phrase: "plank", group: "core" },
      { phrase: "sit up", group: "core" },
      { phrase: "situp", group: "core" },
      { phrase: "oblique", group: "core" },
      { phrase: "russian twist", group: "core" },
      { phrase: "leg raise", group: "core" },
      { phrase: "hollow", group: "core" },
      { phrase: "woodchop", group: "core" },
      { phrase: "pallof", group: "core" },
      { phrase: "ab ", group: "core" },
      { phrase: "core", group: "core" },
    ];
    const CARDIO_LIST = ["run", "bike", "swim", "cycle", "jog", "sprint", "elliptical", "stair", "walk", "treadmill", "rowing machine", "hiit"];

    function detectMuscle(name) {
      const l = normaliseName(name);
      for (const rule of MUSCLE_RULES) { if (l.includes(rule.phrase)) return rule.group; }
      if (CARDIO_LIST.some(k => l.includes(k))) return "cardio";
      return "other";
    }
    function isCardio(name) { const l = normaliseName(name); return CARDIO_LIST.some(k => l.includes(k)); }

    // --- Name normalisation: DB=Dumbbell, BB=Barbell, etc ---
    const NAME_ALIASES = [
      [/\bdb\b/gi, "dumbbell"], [/\bbb\b/gi, "barbell"], [/\bsm\b/gi, "smith machine"],
      [/\boh\b/gi, "overhead"], [/\brdl\b/gi, "romanian deadlift"], [/\bsldl\b/gi, "stiff leg deadlift"],
      [/\bincl\b/gi, "incline"], [/\bdecl\b/gi, "decline"], [/\bham curl\b/gi, "hamstring curl"],
    ];
    function normaliseName(name) {
      let n = name.toLowerCase().trim();
      NAME_ALIASES.forEach(([rx, rep]) => { n = n.replace(rx, rep); });
      return n;
    }
    // Canonical key for PB lookups — aggressive dedup
    // "Flat DB Bench", "Flat Dumbbell Bench Press", "Flat Dumbbell Bench" → same key
    const PB_STRIP_WORDS = ["machine", "press", "raise", "exercise", "cable", "seated", "standing", "lying", "single-leg", "single leg", "tempo", "long stride", "short stride"];
    const PB_SYNONYMS = [
      [/\bdumbbell\b/g, "db"], [/\bbarbell\b/g, "bb"], [/\bsmith machine\b/g, "smith"],
      [/\bhamstring\b/g, "ham"], [/\blateral\b/g, "lat"],
      [/\bcalf raises?\b/g, "calf"], [/\bbench press\b/g, "bench"],
      [/\bshoulder press\b/g, "shoulder"], [/\boverhead press\b/g, "ohp"],
      [/\bchest fly\b/g, "fly"], [/\bchest flye\b/g, "fly"],
      [/\bpull ?down\b/g, "pulldown"], [/\bpull ?up\b/g, "pullup"],
      [/\bchin ?up\b/g, "chinup"],
      [/\bbicep curl\b/g, "curl"], [/\bbiceps curl\b/g, "curl"],
      [/\b(ez[- ]?bar|ez)\b/g, "ez"],
    ];
    function pbKey(name) {
      let n = normaliseName(name);
      // Apply synonym compression
      PB_SYNONYMS.forEach(([rx, rep]) => { n = n.replace(rx, rep); });
      // Remove parenthetical qualifiers like "(Cable)" "(Seated)"
      n = n.replace(/\([^)]*\)/g, "");
      // Remove trailing filler words that don't change the exercise identity
      // BUT keep important differentiators like "incline", "decline", "flat", "wide-grip", "close-grip", "neutral-grip"
      // Collapse multiple spaces
      n = n.replace(/\s+/g, " ").trim();
      return n;
    }
    // Merge duplicate PBs: scans db.pbs for entries with same pbKey, keeps the best
    function deduplicatePBs(pbs) {
      const merged = {};
      const keyMap = {}; // pbKey → best display name
      Object.entries(pbs).forEach(([rawName, pb]) => {
        const k = pbKey(rawName);
        if (!merged[k]) {
          merged[k] = { ...pb };
          keyMap[k] = rawName;
        } else {
          if (pb.maxWeight > merged[k].maxWeight) { merged[k].maxWeight = pb.maxWeight; merged[k].repsAtMax = pb.repsAtMax || 0; }
          else if (pb.maxWeight === merged[k].maxWeight && (pb.repsAtMax || 0) > (merged[k].repsAtMax || 0)) { merged[k].repsAtMax = pb.repsAtMax; }
          if (pb.maxReps > merged[k].maxReps) merged[k].maxReps = pb.maxReps;
          if ((pb.maxVolume || 0) > (merged[k].maxVolume || 0)) merged[k].maxVolume = pb.maxVolume;
          if (rawName.length > keyMap[k].length) keyMap[k] = rawName;
        }
      });
      // Rebuild with canonical keys
      const result = {};
      Object.entries(merged).forEach(([k, pb]) => { result[k] = pb; result[k]._displayName = keyMap[k]; });
      return result;
    }

    // --- Week boundary: Monday 00:00 AEST (UTC+10) ---
    function getMonday(date) {
      const d = new Date(date);
      // Adjust to AEST (UTC+10)
      const aest = new Date(d.getTime() + (10 * 60 * 60 * 1000));
      const day = aest.getUTCDay(); // 0=Sun, 1=Mon
      const diff = day === 0 ? 6 : day - 1; // days since Monday
      aest.setUTCDate(aest.getUTCDate() - diff);
      aest.setUTCHours(0, 0, 0, 0);
      // Convert back to UTC
      return new Date(aest.getTime() - (10 * 60 * 60 * 1000));
    }
    function thisMonday() { return getMonday(new Date()); }
    function thisMonthStart() {
      const d = new Date();
      const aest = new Date(d.getTime() + (10 * 60 * 60 * 1000));
      return new Date(Date.UTC(aest.getUTCFullYear(), aest.getUTCMonth(), 1) - (10 * 60 * 60 * 1000));
    }

    function deepClone(o) { try { return JSON.parse(JSON.stringify(o, (_, v) => typeof v === "number" && isNaN(v) ? null : v)); } catch (e) { console.error("deepClone failed:", e); return o; } }
    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
    function fmtTime(s) { if (s < 0) s = 0; return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, "0")}`; }
    function fmtDur(s) { const hr = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60); return hr > 0 ? `${hr}h ${m}m` : m > 0 ? `${m}m ${sec}s` : `${sec}s`; }

    const C = {
      bg: "#0a0a0f", surface: "#12121a", surfaceLight: "#1a1a28", border: "#2a2a3a",
      text: "#e8e8f0", textDim: "#8888a0",
      cyan: "#00e5ff", cyanDim: "#00e5ff40", green: "#39ff14", greenDim: "#39ff1440",
      amber: "#ffb300", amberDim: "#ffb30040", red: "#ff3d3d", redDim: "#ff3d3d40", purple: "#b388ff", purpleDim: "#b388ff40",
      gold: "#ffc850", goldDim: "#ffc85040",
    };
    const phaseColor = { [PHASES.PREP]: C.amber, [PHASES.WORK]: C.cyan, [PHASES.REST_SET]: C.green, [PHASES.REST_EX]: C.purple, [PHASES.DONE]: C.green };

    // --- Storage ---
    const SEED_PBS = {
      "standing calf raise": { maxWeight: 136, maxReps: 10, maxVolume: 2460, repsAtMax: 10 },
      "flat dumbbell bench press": { maxWeight: 70, maxReps: 9, maxVolume: 1890, repsAtMax: 9 },
      "incline dumbbell bench press": { maxWeight: 60, maxReps: 10, maxVolume: 1860, repsAtMax: 10 },
      "leg curl": { maxWeight: 45, maxReps: 10, maxVolume: 1620, repsAtMax: 10 },
      "seated dumbbell shoulder press": { maxWeight: 44, maxReps: 10, maxVolume: 1500, repsAtMax: 10 },
      "chest-supported row": { maxWeight: 40, maxReps: 10, maxVolume: 1600, repsAtMax: 10 },
      "smith machine split squat": { maxWeight: 40, maxReps: 10, maxVolume: 1360, repsAtMax: 10 },
      "split squat": { maxWeight: 40, maxReps: 10, maxVolume: 1040, repsAtMax: 10 },
      "cable chest fly": { maxWeight: 27, maxReps: 10, maxVolume: 905, repsAtMax: 10 },
      "incline fly": { maxWeight: 20, maxReps: 8, maxVolume: 334, repsAtMax: 8 },
    };
    function mkBPEx(name) { return { name, muscle: detectMuscle(name), isCardio: isCardio(name) }; }
    const SEED_BLUEPRINTS = {
      Monday: { name: "Workout A – Upper Emphasis", exercises: [
        "Pallof Press", "Dead Bug", "Flat Dumbbell Bench Press", "Chest-Supported Row",
        "Seated Dumbbell Shoulder Press", "Wide-Grip Lat Pulldown", "Incline Dumbbell Bench Press",
        "Cable Chest Fly", "Hip Thrust", "Leg Extension",
        "Smith Machine Split Squat", "Leg Curl", "Standing Calf Raise"
      ].map(mkBPEx) },
      Tuesday: { name: "Workout B – Lower Emphasis", exercises: [
        "McGill Curl-Up", "Leg Press", "Glute Kickback (Cable)", "Leg Curl (Seated)",
        "Smith Machine Split Squat (Long Stride)", "Seated Calf Raise",
        "Machine Chest Press", "Pec Deck", "Neutral-Grip Lat Pulldown",
        "Cable Lateral Raise", "Rear-Delt Cable Fly", "EZ-Bar Curl", "Rope Triceps Pushdown"
      ].map(mkBPEx) },
      Thursday: { name: "Workout C – Upper Emphasis", exercises: [
        "Hanging Knee Raise", "Plank Hold", "Incline Dumbbell Fly", "Seated Cable Row",
        "Dumbbell Shoulder Press", "One-Arm Dumbbell Row", "Close-Grip Bench Press",
        "Straight-Arm Pulldown", "Leg Extension", "Hip Thrust (Single-Leg)",
        "Leg Curl", "Smith Machine Split Squat (Short Stride)", "Standing Calf Raise", "Face Pulls"
      ].map(mkBPEx) },
      Friday: { name: "Workout D – Lower Emphasis", exercises: [
        "Russian Twist", "Hip Thrust", "Leg Extension (Tempo)",
        "Glute Kickback (Cable)", "Leg Curl (Single-Leg)", "Seated Calf Raise",
        "Machine Chest Press", "Chest-Supported T-Bar Row", "Cable Lateral Raise",
        "Reverse Pec Deck", "Skull Crushers", "Incline Dumbbell Curl", "Barbell Curl"
      ].map(mkBPEx) },
    };
    function loadDB() {
      try {
        const d = localStorage.getItem(STORAGE_KEY);
        if (d) {
          const parsed = JSON.parse(d);
          let changed = false;
          if (!parsed._pbSeeded) { parsed.pbs = { ...SEED_PBS, ...(parsed.pbs || {}) }; parsed._pbSeeded = true; changed = true; }
          if (!parsed._bpSeeded) { parsed.blueprints = { ...SEED_BLUEPRINTS, ...(parsed.blueprints || {}) }; parsed._bpSeeded = true; changed = true; }
          // Deduplicate PBs on load
          const dedupedPBs = deduplicatePBs(parsed.pbs || {});
          if (Object.keys(dedupedPBs).length !== Object.keys(parsed.pbs || {}).length) { parsed.pbs = dedupedPBs; changed = true; }
          // Backfill repsAtMax from history for PBs that don't have it
          Object.entries(parsed.pbs || {}).forEach(([k, pb]) => {
            if (pb.repsAtMax != null && pb.repsAtMax > 0) return; // already has it
            let bestRepsAtMax = 0;
            (parsed.history || []).forEach(session => {
              (session.exercises || []).forEach(ex => {
                if (pbKey(ex.name) !== k) return;
                (ex.sets || []).forEach(s => {
                  if (s.weight === pb.maxWeight && (s.reps || 0) > bestRepsAtMax) bestRepsAtMax = s.reps;
                });
              });
            });
            if (bestRepsAtMax > 0) { parsed.pbs[k].repsAtMax = bestRepsAtMax; changed = true; }
          });
          if (changed) saveDB(parsed);
          return parsed;
        }
      } catch {}
      // Legacy scan
      try {
        const keys = ["ironfocus_data", "ironfocus_history", "ironfocus_blueprints", "ironfocus_v2_master"];
        let merged = emptyDB();
        for (const k of keys) {
          try { const r = localStorage.getItem(k); if (r) { const d = JSON.parse(r); if (d.history) merged.history.push(...d.history); if (d.blueprints) Object.assign(merged.blueprints, d.blueprints); if (d.pbs) Object.assign(merged.pbs, d.pbs); } } catch {}
        }
        if (merged.history.length > 0 || Object.keys(merged.blueprints).length > 0) return merged;
      } catch {}
      const fresh = emptyDB();
      fresh.pbs = { ...SEED_PBS };
      fresh.blueprints = { ...SEED_BLUEPRINTS };
      fresh._pbSeeded = true;
      fresh._bpSeeded = true;
      return fresh;
    }
    function saveDB(db) {
      try {
        const clone = deepClone(db);
        if (!clone || !clone.history) { console.error("saveDB aborted: invalid data"); return false; }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(clone));
        return true;
      } catch (e) { console.error("Save failed:", e); return false; }
    }
    function emptyDB() { return { history: [], blueprints: {}, pbs: {}, settings: { timers: { ...DEFAULT_TIMERS }, audioEnabled: true, volumeTargets: { ...DEFAULT_VOLUME_TARGETS }, trainingDays: ["Monday", "Tuesday", "Thursday", "Friday"] } }; }

    // Default weekly volume targets (working sets per muscle group)
    const DEFAULT_VOLUME_TARGETS = { chest: 16, back: 16, shoulders: 12, quads: 12, hamstrings: 10, glutes: 10, calves: 8, biceps: 8, triceps: 8, core: 8 };

    // Build exercise library from history + blueprints
    function buildExerciseLibrary(db) {
      const lib = {}; // pbKey → { name, muscle, isCardio, lastUsed, frequency }
      // Scan history
      (db.history || []).forEach(session => {
        const d = session.date;
        (session.exercises || []).forEach(ex => {
          const k = pbKey(ex.name);
          if (!lib[k]) lib[k] = { name: ex.name, muscle: ex.muscle || detectMuscle(ex.name), isCardio: isCardio(ex.name), lastUsed: d, frequency: 0 };
          lib[k].frequency++;
          if (new Date(d) > new Date(lib[k].lastUsed)) { lib[k].lastUsed = d; lib[k].name = ex.name; }
          if (ex.muscle && ex.muscle !== "other") lib[k].muscle = ex.muscle;
        });
      });
      // Scan blueprints
      Object.values(db.blueprints || {}).forEach(bp => {
        (bp.exercises || []).forEach(ex => {
          const k = pbKey(ex.name);
          if (!lib[k]) lib[k] = { name: ex.name, muscle: ex.muscle || detectMuscle(ex.name), isCardio: isCardio(ex.name), lastUsed: null, frequency: 0 };
          if (ex.muscle && ex.muscle !== "other") lib[k].muscle = ex.muscle;
        });
      });
      return lib;
    }

    // --- Crash Recovery ---
    function saveActiveWorkout(wo, phase, clock) {
      if (!wo) { clearActiveWorkout(); return; }
      try { localStorage.setItem(CRASH_KEY, JSON.stringify({ wo: deepClone(wo), phase, clock, savedAt: Date.now() })); } catch (e) { console.error("Crash save failed:", e); }
    }
    function loadActiveWorkout() {
      try { const d = localStorage.getItem(CRASH_KEY); if (!d) return null; const snap = JSON.parse(d); if (Date.now() - snap.savedAt > 12 * 60 * 60 * 1000) { clearActiveWorkout(); return null; } return snap; } catch { return null; }
    }
    function clearActiveWorkout() { try { localStorage.removeItem(CRASH_KEY); } catch {} }

    const phaseLabel = { [PHASES.PREP]: "GET READY", [PHASES.WORK]: "WORK", [PHASES.REST_SET]: "REST BETWEEN SETS", [PHASES.REST_EX]: "REST BETWEEN EXERCISES", [PHASES.DONE]: "DONE" };

    // --- Audio Engine ---
    class AudioEngine {
      constructor() { this.ctx = null; this.enabled = true; this.hb = null; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === "suspended") this.ctx.resume(); }

    function RingTimer({ seconds, total, color, size = 170 }) {
      const r = (size - 6) / 2;

      const offset = circ * (1 - progress);

    function Train() {
      const { db, persist, notify, setScreen, wo, setWo, phase, setPhase, timer, setTimer, paused, setPaused, clock, setClock } = useContext(AppCtx);
      const [showAdd, setShowAdd] = useState(false);
      const [addText, setAddText] = useState("");
      const [showQuit, setShowQuit] = useState(false);
      const [editingQueueIdx, setEditingQueueIdx] = useState(null);
      const [editingQueueName, setEditingQueueName] = useState("");
      const [editingCurrentName, setEditingCurrentName] = useState(null); // null = not editing, string = editing
      const [pbOverlay, setPbOverlay] = useState(null); // { name, weight, reps, prevWeight, prevReps }
      const [sessionPBs, setSessionPBs] = useState([]); // PBs achieved this workout

      const timerRef = useRef(null);
      const clockRef = useRef(null);
      const backRef = useRef(0);
      const timers = db.settings?.timers || DEFAULT_TIMERS;
      const curEx = wo?.exercises[wo.currentExIdx];
      const totalSets = wo ? wo.exercises.reduce((s, e) => s + e.sets.length, 0) : 0;
      const doneSets = wo ? wo.exercises.reduce((s, e) => s + e.sets.filter(x => x.completed).length, 0) : 0;
      const remainingSets = totalSets - doneSets;

      // Estimated time remaining
      const estRemaining = useMemo(() => {
        if (!wo || phase === PHASES.DONE) return 0;
        const avgSetCycle = timers.work + timers.restSet;
        const remainingExercises = wo.exercises.length - wo.currentExIdx - 1;
        return Math.max(0, remainingSets * avgSetCycle + remainingExercises * (timers.restEx - timers.restSet));
      }, [wo?.currentExIdx, wo?.currentSetIdx, remainingSets, timers, phase]);

      // Determine which exercise to show stats for: current, or next during REST_EX
      const statsEx = (phase === PHASES.REST_EX && wo) ? wo.exercises[wo.currentExIdx + 1] : curEx;

      // PB data
      const curPB = statsEx ? db.pbs?.[pbKey(statsEx.name)] : null;

      // Find the session where the PB weight was set
      const pbSession = useMemo(() => {
        if (!statsEx || !curPB) return null;
        const nm = pbKey(statsEx.name);
        for (let i = db.history.length - 1; i >= 0; i--) {
          const ex = db.history[i].exercises?.find(e => pbKey(e.name) === nm);
          if (ex && ex.sets?.some(s => s.weight === curPB.maxWeight)) return { date: db.history[i].date };
        }
        return null;
      }, [statsEx?.name, curPB, db.history]);

      // Last performance — most recent session with this exercise
      const lastPerf = useMemo(() => {
        if (!statsEx) return null;
        const nm = pbKey(statsEx.name);
        for (let i = db.history.length - 1; i >= 0; i--) {
          const ex = db.history[i].exercises?.find(e => pbKey(e.name) === nm);
          if (ex) {
            const sets = ex.sets || [];
            const maxW = Math.max(0, ...sets.map(s => s.weight || 0));
            return {
              date: db.history[i].date,
              sets,

          }

      }, [statsEx?.name, db.history]);

      // Auto-populate weights (not reps) from last session when exercise changes
      const prevExIdxRef = useRef(null);
      useEffect(() => {
        if (!wo || !curEx || curEx.isCardio) return;
        if (prevExIdxRef.current === wo.currentExIdx) return;

        if (lastPerf && lastPerf.sets.length > 0) {
          const allEmpty = curEx.sets.every(s => !s.weight || s.weight === 0);
          if (allEmpty) {
            setWo(prev => {
              const next = deepClone(prev);
              const ex = next.exercises[next.currentExIdx];
              ex.sets.forEach((s, i) => {
                const historySet = lastPerf.sets[i] || lastPerf.sets[lastPerf.sets.length - 1];
                if (historySet) {

                }

            });
          }
        }
      }, [wo?.currentExIdx, lastPerf]);

      function updateSet(ei, si, field, val) {
        setWo(prev => {
          const next = deepClone(prev);

        });
      }

      function spreadWeight(ei) {
        setWo(prev => {
          const next = deepClone(prev);
          const w = next.exercises[ei].sets[0]?.weight;
          if (!w) return prev;
          for (let i = 1; i < next.exercises[ei].sets.length; i++) {

          }
          return next;
        });
      }

      function copyWeightDown(ei, fromSetIdx) {
        setWo(prev => {
          const next = deepClone(prev);

      }

          if (remaining <= 1.1 && remaining > 0.9) audio.countdownPip();

      }

      function moveUp(exIdx) {

          const temp = next.exercises[exIdx];
          next.exercises[exIdx] = next.exercises[exIdx - 1];
          next.exercises[exIdx - 1] = temp;
          return next;
        });

      function moveDown(exIdx) {
        if (exIdx <= wo.currentExIdx || exIdx >= wo.exercises.length - 1) return;
        setWo(prev => {
          const next = deepClone(prev);
          const temp = next.exercises[exIdx];
          next.exercises[exIdx] = next.exercises[exIdx + 1];
          next.exercises[exIdx + 1] = temp;
          return next;
        });
      }

      function removeFromQueue(exIdx) {
        if (exIdx <= wo.currentExIdx) return;
        setWo(prev => {
          const next = deepClone(prev);
          next.exercises.splice(exIdx, 1);
          return next;
        });
        notify("Removed from queue", "info");
      }

      function startEditQueue(exIdx) {
        setEditingQueueIdx(exIdx);
        setEditingQueueName(wo.exercises[exIdx].name);
      }

      function saveEditQueue(exIdx) {
        if (!editingQueueName.trim()) { setEditingQueueIdx(null); return; }
        setWo(prev => {
          const next = deepClone(prev);
          next.exercises[exIdx].name = editingQueueName.trim();
          next.exercises[exIdx].muscle = detectMuscle(editingQueueName.trim());
          next.exercises[exIdx].isCardio = isCardio(editingQueueName.trim());
          return next;
        });
        setEditingQueueIdx(null);
        notify("Exercise updated", "success");
      }

      function jumpToExercise(exIdx) {
        if (exIdx === wo.currentExIdx) return;
        setWo(prev => ({ ...prev, currentExIdx: exIdx, currentSetIdx: 0 }));
        setPhase(PHASES.PREP);
        setPhaseTimer(timers.prep);

        if (ex) audio.speak(`Jumping to ${ex.name}`);
        notify(`Jumped to ${wo.exercises[exIdx]?.name}`, "success");
      }

      function updateExMuscleWo(exIdx, newMuscle) {
        setWo(prev => {
          const next = deepClone(prev);
          next.exercises[exIdx].muscle = newMuscle;
          return next;
        });
      }

      function renameCurrentExercise() {
        if (!editingCurrentName || !editingCurrentName.trim()) { setEditingCurrentName(null); return; }

        setWo(prev => {
          const next = deepClone(prev);
          next.exercises[next.currentExIdx].name = newName;
          next.exercises[next.currentExIdx].muscle = detectMuscle(newName);
          next.exercises[next.currentExIdx].isCardio = isCardio(newName);
          return next;
        });
        setEditingCurrentName(null);
        notify(`Changed to ${newName}`, "success");
      }

      function addExercise(bulk) {

      if (!wo) return h("div", { className: "fade-in", style: { padding: "40px 16px", textAlign: "center", maxWidth: 500, margin: "0 auto", paddingBottom: 90 } },
        h("div", { style: { fontSize: 48, marginBottom: 16 } }, "🏋️"),
        h("h2", { style: { fontSize: 20, fontWeight: 700, marginBottom: 8 } }, "No Active Workout"),
        h("p", { style: { color: C.textDim, fontSize: 13, marginBottom: 24 } }, "Start a workout from the Home screen or load a Blueprint."),
        h("button", { onClick: () => setScreen("home"), style: { background: C.cyan, color: C.bg, border: "none", borderRadius: 12, padding: "14px 32px", fontSize: 15, fontWeight: 700, cursor: "pointer" } }, "Go Home"),
      );

      const glow = phaseColor[phase] || C.cyan;
      const prog = totalSets > 0 ? doneSets / totalSets : 0;

            h("div", { style: { textAlign: "center" } },

          exs[idx] = { ...exs[idx], muscle: newMuscle };

    // ANALYTICS
    // ============================================================
    function Analytics() {
      const { db, persist, notify } = useContext(AppCtx);
      const [editingPB, setEditingPB] = useState(null);
      const [pbWeight, setPbWeight] = useState(0);
      const [pbReps, setPbReps] = useState(0);

      // Weekly sessions data for chart — using Monday-AEST boundaries
      const weeklyData = useMemo(() => {
        const weeks = {};
        db.history.forEach(x => {
          const mon = getMonday(new Date(x.date));
          const k = mon.toISOString().split("T")[0];
          if (!weeks[k]) weeks[k] = { sessions: 0, sets: 0 };
          weeks[k].sessions++;
          (x.exercises || []).forEach(ex => { weeks[k].sets += (ex.sets || []).filter(s => s.completed !== false).length; });
        });
        return Object.entries(weeks).sort((a, b) => a[0].localeCompare(b[0])).slice(-8);
      }, [db.history]);

      const curSets = weeklyData.length > 0 ? weeklyData[weeklyData.length - 1][1].sets : 0;
      const lastSets = weeklyData.length > 1 ? weeklyData[weeklyData.length - 2][1].sets : 0;
      const change = lastSets > 0 ? ((curSets - lastSets) / lastSets * 100).toFixed(0) : 0;
      const curSessions = weeklyData.length > 0 ? weeklyData[weeklyData.length - 1][1].sessions : 0;

      const pbs = Object.entries(db.pbs || {}).sort((a, b) => b[1].maxWeight - a[1].maxWeight);

      // PBs set this week — scan history for sessions this week, find max per exercise
      const weekPBs = useMemo(() => {
        const mondayStart = thisMonday();
        const thisWeekSessions = db.history.filter(x => new Date(x.date) >= mondayStart);
        const results = [];
        const allPBs = db.pbs || {};
        thisWeekSessions.forEach(session => {
          (session.exercises || []).forEach(ex => {
            const k = pbKey(ex.name);
            const pb = allPBs[k];
            if (!pb) return;
            const sessionMax = Math.max(0, ...(ex.sets || []).map(s => s.weight || 0));
            if (sessionMax >= pb.maxWeight && sessionMax > 0) {
              if (!results.find(r => r.key === k)) results.push({ key: k, name: pb._displayName || ex.name, weight: pb.maxWeight, reps: (pb.repsAtMax != null ? pb.repsAtMax : pb.maxReps) });
            }
          });
        });
        return results;
      }, [db.history, db.pbs]);

      function runDedup() {
        const deduped = deduplicatePBs(db.pbs || {});
        persist(prev => ({ ...prev, pbs: deduped }));
        notify(`Cleaned up PBs: ${Object.keys(db.pbs || {}).length} → ${Object.keys(deduped).length}`, "success");
      }

      function startEditPB(name, pb) { setEditingPB(name); setPbWeight(pb.maxWeight); setPbReps((pb.repsAtMax != null ? pb.repsAtMax : pb.maxReps)); }
      function savePB() {
        persist(prev => ({ ...prev, pbs: { ...prev.pbs, [editingPB]: { ...prev.pbs[editingPB], maxWeight: pbWeight, maxReps: pbReps, repsAtMax: pbReps } } }));
        setEditingPB(null); notify("PB updated", "success");
      }
      function deletePB(name) {
        persist(prev => { const pbs = { ...prev.pbs }; delete pbs[name]; return { ...prev, pbs }; });
        notify(`Deleted PB: ${name}`, "info");
      }

      return h("div", { className: "fade-in", style: { padding: "20px 16px", maxWidth: 500, margin: "0 auto", paddingBottom: 90 } },

          h("div", { style: { display: "flex", gap: 16, alignItems: "flex-end" } },
            h("div", { style: { flex: 1 } }, h("div", { style: { fontSize: 11, color: C.textDim, marginBottom: 4 } }, "Working Sets"), h("div", { style: { fontSize: 28, fontWeight: 700, color: C.cyan, fontFamily: "'JetBrains Mono'" } }, curSets)),
            h("div", { style: { flex: 1 } }, h("div", { style: { fontSize: 11, color: C.textDim, marginBottom: 4 } }, "Sessions"), h("div", { style: { fontSize: 28, fontWeight: 700, color: C.green, fontFamily: "'JetBrains Mono'" } }, curSessions)),
            lastSets > 0 && h("div", { style: { padding: "6px 14px", borderRadius: 20, fontSize: 14, fontWeight: 700, background: change >= 0 ? C.greenDim : C.redDim, color: change >= 0 ? C.green : C.red } }, `${change >= 0 ? "↑" : "↓"} ${Math.abs(change)}%`),
          ),
        ),
        // Chart — weekly sets
        weeklyData.length > 0 && h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
          h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 } },
            h("div", { style: { fontSize: 11, color: C.textDim, textTransform: "uppercase", letterSpacing: 1 } }, "Weekly Sets"),
            h("div", { style: { fontSize: 11, color: C.textDim } }, `${weeklyData.length} weeks`),

          // Grid lines
          h("div", { style: { position: "relative", height: 140, marginBottom: 4 } },
            // Horizontal grid lines
            (() => {
              const max = Math.max(...weeklyData.map(x => x[1].sets), 1);
              const gridLines = [0, 0.25, 0.5, 0.75, 1].map(pct => Math.round(max * pct));
              return h(Fragment, null,

                  h("div", { key: gi, style: { position: "absolute", left: 0, right: 0, bottom: `${(val / max) * 100}%`, borderBottom: gi === 0 ? "none" : `1px solid ${C.border}40`, display: "flex", alignItems: "flex-end" } },
                    gi > 0 && gi < gridLines.length && h("span", { style: { position: "absolute", left: -2, top: -8, fontSize: 8, color: `${C.textDim}60`, fontFamily: "'JetBrains Mono'" } }, val),

                return h("div", { key: w, style: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 0, height: "100%", justifyContent: "flex-end" } },
                  // Value label
                  h("div", { style: { fontSize: 10, fontWeight: 600, color: isCurrent ? C.cyan : C.textDim, fontFamily: "'JetBrains Mono'", marginBottom: 3 } }, d.sets),
                  // Bar
                  h("div", { style: { width: "100%", maxWidth: 36, height: `${ht}%`, background: isCurrent ? `linear-gradient(180deg, ${C.cyan}, ${C.cyan}80)` : barColor, borderRadius: "4px 4px 2px 2px", transition: "height 0.5s ease", boxShadow: isCurrent ? `0 0 12px ${C.cyan}30` : "none", position: "relative" } },

          h("div", { style: { display: "flex", gap: 6, paddingLeft: 20 } },
            weeklyData.map(([w, d], i) => {

        // PBs set this week
        weekPBs.length > 0 && h("div", { style: { background: `linear-gradient(135deg, ${C.gold}08, ${C.gold}03)`, borderRadius: 16, padding: 20, border: `1px solid ${C.gold}25`, marginBottom: 12 } },
          h("div", { style: { fontSize: 11, color: C.gold, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 } }, `🏆 This Week's PBs (${weekPBs.length})`),
          weekPBs.map(pb => h("div", { key: pb.key, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", background: `${C.gold}08`, borderRadius: 8, marginBottom: 4, border: `1px solid ${C.gold}15` } },

    // ============================================================
    // SETTINGS
    // ============================================================
    function Settings() {
      const { db, persist, notify, setScreen } = useContext(AppCtx);
      const [restoring, setRestoring] = useState(false);
      const t = db.settings?.timers || DEFAULT_TIMERS;
      function upd(k, v) { persist(prev => ({ ...prev, settings: { ...prev.settings, timers: { ...(prev.settings?.timers || DEFAULT_TIMERS), [k]: parseInt(v) || 0 } } })); }
      function clearAll() { if (confirm("This will erase ALL data. Are you sure?")) { persist(emptyDB()); notify("All data cleared", "warn"); } }
      function forceUpdate() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(regs => { regs.forEach(r => r.unregister()); });
          caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => { notify("Cache cleared! Reloading...", "success"); setTimeout(() => window.location.reload(true), 500); });
        } else { window.location.reload(true); }
      }

      // Download backup as JSON file
      function downloadBackup() {
        const data = JSON.stringify(deepClone(db), null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `repvault-backup-${new Date().toISOString().split("T")[0]}.json`;
        a.click(); URL.revokeObjectURL(url);
        notify("Backup downloaded", "success");
      }

      // Restore from JSON file
      function handleRestore(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            // Support both raw DB format and export format
            const history = data.history || [];
            const pbs = data.personalBests || data.pbs || {};
            const blueprints = data.weeklyBlueprints || data.blueprints || {};
            if (history.length === 0 && Object.keys(pbs).length === 0) { notify("No data found in file", "warn"); return; }
            // Strip export-only fields from history
            const cleanHistory = history.map(s => ({
              id: s.id || genId(), date: s.date, duration: s.duration || 0,
              exercises: (s.exercises || []).map(ex => ({
                name: ex.name, muscle: ex.muscle || detectMuscle(ex.name), isCardio: ex.isCardio || isCardio(ex.name),
                sets: (ex.sets || []).map(st => ({ weight: st.weight || 0, reps: st.reps || 0, duration: st.duration || 0, completed: st.completed !== false })),
              })),
            }));
            const msg = `Restore ${cleanHistory.length} sessions, ${Object.keys(pbs).length} PBs?`;
            if (!confirm(msg)) return;
            persist(prev => ({
              ...prev,
              history: [...prev.history, ...cleanHistory.filter(h => !prev.history.some(ph => ph.date === h.date))],
              pbs: { ...pbs, ...prev.pbs }, // Keep existing PBs, add missing ones
              blueprints: Object.keys(prev.blueprints || {}).length > 0 ? prev.blueprints : blueprints,
            }));
            notify(`Restored ${cleanHistory.length} sessions!`, "success");
          } catch (err) { notify("Invalid backup file: " + err.message, "error"); }
        };
        reader.readAsText(file);
      }

      // Restore from backup.json on server
      function restoreFromServer() {
        setRestoring(true);
        fetch("backup.json").then(r => { if (!r.ok) throw new Error("No backup file found"); return r.json(); }).then(data => {
          const history = data.history || [];
          const pbs = data.personalBests || data.pbs || {};
          const blueprints = data.weeklyBlueprints || data.blueprints || {};
          const cleanHistory = history.map(s => ({
            id: s.id || genId(), date: s.date, duration: s.duration || 0,
            exercises: (s.exercises || []).map(ex => ({
              name: ex.name, muscle: ex.muscle || detectMuscle(ex.name), isCardio: ex.isCardio || isCardio(ex.name),
              sets: (ex.sets || []).map(st => ({ weight: st.weight || 0, reps: st.reps || 0, duration: st.duration || 0, completed: st.completed !== false })),
            })),
          }));
          persist(prev => ({
            ...prev,
            history: [...prev.history, ...cleanHistory.filter(h => !prev.history.some(ph => ph.date === h.date))],
            pbs: { ...pbs, ...prev.pbs },
            blueprints: Object.keys(prev.blueprints || {}).length > 0 ? prev.blueprints : blueprints,
          }));
          notify(`Restored ${cleanHistory.length} sessions from backup!`, "success");
          setRestoring(false);
        }).catch(err => { notify("Restore failed: " + err.message, "error"); setRestoring(false); });
      }

      const fields = [{ key: "prep", label: "Prep Timer", color: C.amber }, { key: "work", label: "Work Timer", color: C.cyan }, { key: "restSet", label: "Rest (Set)", color: C.green }, { key: "restEx", label: "Rest (Exercise)", color: C.purple }];

      return h("div", { className: "fade-in", style: { padding: "20px 16px", maxWidth: 500, margin: "0 auto", paddingBottom: 90 } },
        h("h2", { style: { fontSize: 22, fontWeight: 800, marginBottom: 16 } }, "Settings"),
        h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
          h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 14 } }, "Timer Defaults (seconds)"),
          fields.map(f => h("div", { key: f.key, style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 } },
            h("span", { style: { fontSize: 13, color: f.color } }, f.label),
            h("input", { type: "number", value: t[f.key], onChange: e => upd(f.key, e.target.value), style: { width: 80, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.text, fontSize: 14, fontFamily: "'JetBrains Mono'", textAlign: "center", outline: "none" } }),
          )),
        ),
        // Backup & Restore
        h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
          h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 12 } }, "Backup & Restore"),
          h("div", { style: { fontSize: 11, color: C.textDim, marginBottom: 12 } }, `${db.history.length} sessions • ${Object.keys(db.pbs || {}).length} PBs stored`),
          h("div", { style: { display: "flex", gap: 8, marginBottom: 8 } },
            h("button", { onClick: downloadBackup, style: { flex: 1, background: C.bg, border: `1px solid ${C.green}30`, borderRadius: 10, padding: 12, color: C.green, cursor: "pointer", fontSize: 12, fontWeight: 600 } }, "⬇️ Download Backup"),
            h("label", { style: { flex: 1, background: C.bg, border: `1px solid ${C.cyan}30`, borderRadius: 10, padding: 12, color: C.cyan, cursor: "pointer", fontSize: 12, fontWeight: 600, textAlign: "center" } },
              "⬆️ Restore from File",
              h("input", { type: "file", accept: ".json", onChange: handleRestore, style: { display: "none" } }),
            ),
          ),
          h("button", { onClick: restoreFromServer, disabled: restoring, style: { width: "100%", background: C.bg, border: `1px solid ${C.amber}30`, borderRadius: 10, padding: 12, color: C.amber, cursor: "pointer", fontSize: 12, fontWeight: 600, opacity: restoring ? 0.5 : 1 } }, restoring ? "Restoring..." : "🔄 Restore from Server Backup"),
        ),
        h("button", { onClick: forceUpdate, style: { width: "100%", background: C.surface, border: `1px solid ${C.cyan}30`, borderRadius: 12, padding: 14, color: C.cyan, cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 8 } }, "🔄 Force Update App"),
        h("div", { style: { fontSize: 10, color: C.textDim, textAlign: "center", marginBottom: 12 } }, "Clears cache and reloads. Your data is safe."),
        h("button", { onClick: clearAll, style: { width: "100%", background: C.surface, border: `1px solid ${C.red}30`, borderRadius: 12, padding: 14, color: C.red, cursor: "pointer", fontSize: 13, fontWeight: 600 } }, "⚠️ Clear All Data"),
        h("button", { onClick: () => setScreen("export"), style: { width: "100%", marginTop: 8, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, color: C.textDim, cursor: "pointer", fontSize: 13, fontWeight: 500 } }, "📤 Export AI-Ready Data"),
        h("div", { style: { textAlign: "center", marginTop: 20, fontSize: 10, color: C.textDim } }, "RepVault v17"),
      );
    }

    // ============================================================
    // EXPORT

    // ============================================================
    // BUILD — Exercise Library, Workout Generator, Volume Forecaster
    // ============================================================
    function Build() {
      const { db, persist, notify, setScreen } = useContext(AppCtx);
      const [tab, setTab] = useState("forecast"); // "forecast", "generate", "targets"
      const targets = db.settings?.volumeTargets || DEFAULT_VOLUME_TARGETS;
      const trainingDays = db.settings?.trainingDays || ["Monday", "Tuesday", "Thursday", "Friday"];
      const [genDays, setGenDays] = useState(trainingDays);
      const [generating, setGenerating] = useState(false);
      const [generatedPlan, setGeneratedPlan] = useState(null);

      // Exercise library
      const library = useMemo(() => buildExerciseLibrary(db), [db]);
      const libraryList = useMemo(() => Object.entries(library).sort((a, b) => (b[1].frequency || 0) - (a[1].frequency || 0)), [library]);

      // Volume forecast from current blueprints
      const forecast = useMemo(() => {
        const byMuscle = {};
        let totalSets = 0;
        trainingDays.forEach(day => {
          const bp = db.blueprints?.[day];
          if (!bp?.exercises) return;
          bp.exercises.forEach(ex => {
            const m = ex.muscle || detectMuscle(ex.name);
            const sets = isCardio(ex.name) ? 1 : SETS_PER_EXERCISE;
            byMuscle[m] = (byMuscle[m] || 0) + sets;
            totalSets += sets;
          });
        });
        return { byMuscle, totalSets };
      }, [db.blueprints, trainingDays]);

      // Last week's actual volume
      const lastWeekActual = useMemo(() => {
        const mondayStart = thisMonday();
        const thisWeekSessions = db.history.filter(x => new Date(x.date) >= mondayStart);
        const byMuscle = {};
        let totalSets = 0;
        thisWeekSessions.forEach(session => {
          (session.exercises || []).forEach(ex => {
            const m = ex.muscle || detectMuscle(ex.name);
            const sets = (ex.sets || []).filter(s => s.completed !== false).length;
            byMuscle[m] = (byMuscle[m] || 0) + sets;
            totalSets += sets;
          });
        });
        return { byMuscle, totalSets };
      }, [db.history]);

      function updateTarget(muscle, val) {
        persist(prev => ({ ...prev, settings: { ...prev.settings, volumeTargets: { ...(prev.settings?.volumeTargets || DEFAULT_VOLUME_TARGETS), [muscle]: parseInt(val) || 0 } } }));
      }

      function toggleTrainingDay(day) {
        const current = db.settings?.trainingDays || trainingDays;
        const next = current.includes(day) ? current.filter(d => d !== day) : [...current, day];
        persist(prev => ({ ...prev, settings: { ...prev.settings, trainingDays: next } }));
      }

      // Workout generator
      function generatePlan() {
        const activeDays = db.settings?.trainingDays || trainingDays;
        if (activeDays.length === 0) { notify("Set training days first", "warn"); return; }

        const tgts = db.settings?.volumeTargets || DEFAULT_VOLUME_TARGETS;
        const setsPerDay = {};
        activeDays.forEach(d => { setsPerDay[d] = []; });

        // Build pool of exercises per muscle, sorted by recency (least recent first for variety)
        const pool = {};
        Object.entries(library).forEach(([k, ex]) => {
          if (ex.isCardio || ex.muscle === "cardio" || ex.muscle === "other") return;
          const m = ex.muscle;
          if (!pool[m]) pool[m] = [];
          pool[m].push({ ...ex, key: k, daysSince: ex.lastUsed ? Math.floor((Date.now() - new Date(ex.lastUsed).getTime()) / 86400000) : 999 });
        });
        // Sort each pool: least recently used first
        Object.values(pool).forEach(arr => arr.sort((a, b) => b.daysSince - a.daysSince));

        // Distribute sets across days
        const muscleOrder = Object.entries(tgts).filter(([m, s]) => s > 0).sort((a, b) => b[1] - a[1]);
        const dayIdx = {};
        activeDays.forEach((d, i) => { dayIdx[d] = i; });

        muscleOrder.forEach(([muscle, targetSets]) => {
          const exercises = pool[muscle] || [];
          if (exercises.length === 0) return;
          const numExercises = Math.ceil(targetSets / SETS_PER_EXERCISE);
          for (let i = 0; i < numExercises; i++) {
            const ex = exercises[i % exercises.length];
            // Assign to the day with fewest exercises so far (round-robin balance)
            const bestDay = activeDays.reduce((best, day) => setsPerDay[day].length < setsPerDay[best].length ? day : best, activeDays[0]);
            setsPerDay[bestDay].push({ name: ex.name, muscle, isCardio: false });
          }
        });

        // Build blueprint format
        const plan = {};
        activeDays.forEach(day => {
          const exercises = setsPerDay[day];
          // Group by muscle for nicer ordering
          exercises.sort((a, b) => {
            const order = Object.keys(tgts);
            return order.indexOf(a.muscle) - order.indexOf(b.muscle);
          });
          plan[day] = {
            name: `Generated – ${day}`,
            exercises: exercises.map(e => ({ name: e.name, muscle: e.muscle, isCardio: e.isCardio })),
          };
        });

        setGeneratedPlan(plan);
        notify(`Generated ${activeDays.length}-day plan`, "success");
      }

      function applyPlan() {
        if (!generatedPlan) return;
        persist(prev => {
          const bps = { ...prev.blueprints };
          Object.entries(generatedPlan).forEach(([day, plan]) => { bps[day] = plan; });
          return { ...prev, blueprints: bps };
        });
        notify("Plan saved to Blueprints!", "success");
        setGeneratedPlan(null);
      }

      const allMuscles = Object.keys(DEFAULT_VOLUME_TARGETS);

      return h("div", { className: "fade-in", style: { padding: "20px 16px", maxWidth: 500, margin: "0 auto", paddingBottom: 90 } },
        h("h2", { style: { fontSize: 22, fontWeight: 800, marginBottom: 4 } }, "Build"),
        h("p", { style: { fontSize: 12, color: C.textDim, marginBottom: 14 } }, `${Object.keys(library).length} exercises in library`),

        // Tab bar
        h("div", { style: { display: "flex", gap: 4, marginBottom: 16, background: C.surface, borderRadius: 10, padding: 3, border: `1px solid ${C.border}` } },
          [{ id: "forecast", label: "Forecast" }, { id: "generate", label: "Generate" }, { id: "targets", label: "Targets" }].map(t =>
            h("button", { key: t.id, onClick: () => setTab(t.id), style: { flex: 1, padding: "9px 0", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", background: tab === t.id ? C.cyan : "transparent", color: tab === t.id ? C.bg : C.textDim } }, t.label)
          ),
        ),

        // === FORECAST TAB ===
        tab === "forecast" && h(Fragment, null,
          h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
            h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 } },
              h("div", { style: { fontSize: 13, fontWeight: 600 } }, "Weekly Volume Forecast"),
              h("div", { style: { fontSize: 22, fontWeight: 700, color: C.cyan, fontFamily: "'JetBrains Mono'" } }, `${forecast.totalSets} sets`),
            ),
            allMuscles.map(m => {
              const planned = forecast.byMuscle[m] || 0;
              const target = targets[m] || 0;
              const actual = lastWeekActual.byMuscle[m] || 0;
              const status = target === 0 ? "none" : planned >= target ? "hit" : planned >= target * 0.7 ? "close" : "under";
              const statusColor = status === "hit" ? C.green : status === "close" ? C.amber : status === "under" ? C.red : C.textDim;
              const pct = target > 0 ? Math.min(1, planned / target) : 0;
              return h("div", { key: m, style: { marginBottom: 8 } },
                h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 } },
                  h("span", { style: { fontSize: 12, textTransform: "capitalize", color: C.text, fontWeight: 500 } }, m),
                  h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
                    h("span", { style: { fontSize: 11, fontFamily: "'JetBrains Mono'", color: statusColor, fontWeight: 600 } }, `${planned}/${target}`),
                    actual > 0 && h("span", { style: { fontSize: 9, color: C.textDim } }, `done: ${actual}`),
                    status !== "none" && h("span", { style: { fontSize: 9, padding: "1px 5px", borderRadius: 8, background: `${statusColor}15`, color: statusColor, fontWeight: 600 } }, status === "hit" ? "✓" : status === "close" ? "~" : "↓"),
                  ),
                ),
                h("div", { style: { height: 4, background: C.border, borderRadius: 2 } },
                  h("div", { style: { height: "100%", width: `${pct * 100}%`, background: statusColor, borderRadius: 2, transition: "width 0.3s" } }),
                ),
              );
            }),
          ),
          // Training days config
          h("div", { style: { background: C.surface, borderRadius: 16, padding: 16, border: `1px solid ${C.border}`, marginBottom: 12 } },
            h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 10 } }, "Training Days"),
            h("div", { style: { display: "flex", gap: 4, flexWrap: "wrap" } },
              DAYS.map(d => {
                const active = trainingDays.includes(d);
                return h("button", { key: d, onClick: () => toggleTrainingDay(d), style: { padding: "7px 12px", borderRadius: 8, border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer", background: active ? C.cyan : C.bg, color: active ? C.bg : C.textDim } }, d.slice(0, 3));
              }),
            ),
          ),
        ),

        // === GENERATE TAB ===
        tab === "generate" && h(Fragment, null,
          h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
            h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 6 } }, "Workout Generator"),
            h("p", { style: { fontSize: 12, color: C.textDim, marginBottom: 14, lineHeight: 1.5 } }, `Generates a ${trainingDays.length}-day plan from your exercise library (${Object.keys(library).length} exercises) to hit your volume targets. Prioritises exercises you haven't done recently.`),
            h("button", { onClick: generatePlan, style: { width: "100%", background: C.cyan, color: C.bg, border: "none", borderRadius: 12, padding: 14, fontSize: 14, fontWeight: 700, cursor: "pointer" } }, "⚡ Generate Plan"),
          ),
          // Generated plan preview
          generatedPlan && h("div", { className: "slide-up", style: { background: C.surface, borderRadius: 16, padding: 16, border: `1px solid ${C.green}40`, marginBottom: 12 } },
            h("div", { style: { fontSize: 13, fontWeight: 600, color: C.green, marginBottom: 12 } }, "Generated Plan"),
            Object.entries(generatedPlan).map(([day, plan]) =>
              h("div", { key: day, style: { marginBottom: 10 } },
                h("div", { style: { fontSize: 12, fontWeight: 700, color: C.cyan, marginBottom: 4 } }, day),
                h("div", { style: { display: "flex", flexDirection: "column", gap: 2 } },
                  plan.exercises.map((ex, i) =>
                    h("div", { key: i, style: { display: "flex", justifyContent: "space-between", padding: "4px 8px", background: C.bg, borderRadius: 6, fontSize: 11 } },
                      h("span", { style: { color: C.text } }, ex.name),
                      h("span", { style: { color: C.textDim, textTransform: "capitalize", fontSize: 10 } }, ex.muscle),
                    )
                  ),
                ),
              )
            ),
            // Forecast for generated plan
            h("div", { style: { marginTop: 10, padding: 10, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` } },
              h("div", { style: { fontSize: 10, color: C.textDim, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 } }, "Projected volume"),
              (() => {
                const genForecast = {};
                Object.values(generatedPlan).forEach(p => p.exercises.forEach(ex => {
                  const m = ex.muscle || "other";
                  genForecast[m] = (genForecast[m] || 0) + SETS_PER_EXERCISE;
                }));
                return h("div", { style: { display: "flex", flexWrap: "wrap", gap: 4 } },
                  Object.entries(genForecast).filter(([m]) => m !== "other" && m !== "cardio").map(([m, sets]) => {
                    const target = targets[m] || 0;
                    const color = target === 0 ? C.textDim : sets >= target ? C.green : sets >= target * 0.7 ? C.amber : C.red;
                    return h("span", { key: m, style: { fontSize: 10, padding: "3px 8px", borderRadius: 12, background: `${color}15`, color, fontFamily: "'JetBrains Mono'", fontWeight: 600 } }, `${m}: ${sets}/${target}`);
                  })
                );
              })(),
            ),
            h("div", { style: { display: "flex", gap: 8, marginTop: 12 } },
              h("button", { onClick: applyPlan, style: { flex: 1, background: C.green, color: C.bg, border: "none", borderRadius: 10, padding: 12, fontWeight: 700, cursor: "pointer", fontSize: 13 } }, "Save to Plans"),
              h("button", { onClick: generatePlan, style: { flex: 1, background: C.bg, color: C.textDim, border: `1px solid ${C.border}`, borderRadius: 10, padding: 12, fontWeight: 600, cursor: "pointer", fontSize: 13 } }, "Regenerate"),
            ),
          ),
          // Exercise library preview
          h("div", { style: { background: C.surface, borderRadius: 16, padding: 16, border: `1px solid ${C.border}` } },
            h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 10 } }, `Exercise Library (${libraryList.length})`),
            h("div", { style: { maxHeight: 300, overflowY: "auto" } },
              libraryList.slice(0, 40).map(([k, ex]) => {
                const daysSince = ex.lastUsed ? Math.floor((Date.now() - new Date(ex.lastUsed).getTime()) / 86400000) : null;
                return h("div", { key: k, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 8px", borderBottom: `1px solid ${C.border}30`, fontSize: 11 } },
                  h("span", { style: { flex: 1, color: C.text } }, ex.name),
                  h("span", { style: { color: C.textDim, textTransform: "capitalize", fontSize: 10, marginRight: 8 } }, ex.muscle),
                  daysSince !== null
                    ? h("span", { style: { fontSize: 9, color: daysSince > 14 ? C.amber : C.textDim } }, `${daysSince}d ago`)
                    : h("span", { style: { fontSize: 9, color: C.textDim } }, "plan only"),
                );
              }),
              libraryList.length > 40 && h("div", { style: { fontSize: 10, color: C.textDim, padding: 8, textAlign: "center" } }, `+${libraryList.length - 40} more`),
            ),
          ),
        ),

        // === TARGETS TAB ===
        tab === "targets" && h(Fragment, null,
          h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
            h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 14 } }, "Weekly Volume Targets (sets)"),
            allMuscles.map(m => {
              const muscleColors = { chest: C.cyan, back: C.green, shoulders: C.amber, glutes: C.purple, quads: C.cyan, hamstrings: C.green, calves: C.amber, biceps: C.cyan, triceps: C.green, core: C.amber };
              const mc = muscleColors[m] || C.cyan;
              return h("div", { key: m, style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
                h("span", { style: { fontSize: 13, color: mc, textTransform: "capitalize", fontWeight: 500 } }, m),
                h("input", { type: "number", inputMode: "numeric", value: targets[m] || 0, onChange: e => updateTarget(m, e.target.value), style: { width: 64, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 10px", color: C.text, fontSize: 14, fontFamily: "'JetBrains Mono'", textAlign: "center", outline: "none" } }),
              );
            }),
          ),
          h("div", { style: { background: C.surface, borderRadius: 16, padding: 16, border: `1px solid ${C.border}` } },
            h("div", { style: { fontSize: 13, fontWeight: 600, marginBottom: 6 } }, "Total Weekly Target"),
            h("div", { style: { fontSize: 28, fontWeight: 700, color: C.cyan, fontFamily: "'JetBrains Mono'" } }, Object.values(targets).reduce((s, v) => s + v, 0), h("span", { style: { fontSize: 14, color: C.textDim, fontWeight: 400, marginLeft: 6 } }, "sets/week")),
            h("div", { style: { fontSize: 11, color: C.textDim, marginTop: 4 } }, `Across ${trainingDays.length} training days = ~${Math.round(Object.values(targets).reduce((s, v) => s + v, 0) / Math.max(1, trainingDays.length))} sets/session`),
          ),
        ),
      );
    }
    // ============================================================
    function Export() {
      const { db, setScreen } = useContext(AppCtx);
      const [copied, setCopied] = useState(false);
      const data = useMemo(() => ({
        meta: { app: "RepVault", version: "2.0", exportedAt: new Date().toISOString(), format: "ai-ready" },
        summary: { totalSessions: db.history.length, totalExercises: db.history.reduce((s, x) => s + (x.exercises?.length || 0), 0), dateRange: db.history.length > 0 ? { from: db.history[0]?.date, to: db.history[db.history.length - 1]?.date } : null },
        personalBests: db.pbs, weeklyBlueprints: db.blueprints,
        history: db.history.map(x => ({ date: x.date, duration: x.duration, exercises: (x.exercises || []).map(ex => ({ name: ex.name, muscle: ex.muscle, sets: ex.sets, totalVolume: (ex.sets || []).reduce((s, st) => s + (st.weight || 0) * (st.reps || 0), 0) })), sessionVolume: (x.exercises || []).reduce((s, ex) => s + (ex.sets || []).reduce((ss, st) => ss + (st.weight || 0) * (st.reps || 0), 0), 0) })),
      }), [db]);

      function copy() { navigator.clipboard?.writeText(JSON.stringify(data, null, 2)); setCopied(true); setTimeout(() => setCopied(false), 2000); }

      return h("div", { className: "fade-in", style: { padding: "20px 16px", maxWidth: 500, margin: "0 auto", paddingBottom: 90 } },
        h("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 16 } },
          h("button", { onClick: () => setScreen("home"), style: { background: "none", border: "none", color: C.textDim, fontSize: 20, cursor: "pointer" } }, "←"),
          h("h2", { style: { fontSize: 22, fontWeight: 800 } }, "AI-Ready Export"),
        ),
        h("div", { style: { background: C.surface, borderRadius: 16, padding: 20, border: `1px solid ${C.border}`, marginBottom: 12 } },
          h("div", { style: { fontSize: 13, color: C.textDim, marginBottom: 12 } }, "Structured JSON for LLM consumption. Paste into Gemini, Claude, or ChatGPT for fatigue analysis and programming recommendations."),
          h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 } },
            h("span", { style: { fontSize: 11, padding: "4px 10px", background: C.cyanDim, color: C.cyan, borderRadius: 20 } }, `${data.summary.totalSessions} sessions`),
            h("span", { style: { fontSize: 11, padding: "4px 10px", background: C.greenDim, color: C.green, borderRadius: 20 } }, `${data.summary.totalExercises} exercises`),
            h("span", { style: { fontSize: 11, padding: "4px 10px", background: C.amberDim, color: C.amber, borderRadius: 20 } }, `${Object.keys(db.pbs || {}).length} PBs`),
          ),
          h("button", { onClick: copy, style: { width: "100%", background: copied ? C.green : C.cyan, color: C.bg, border: "none", borderRadius: 12, padding: 16, fontSize: 15, fontWeight: 700, cursor: "pointer", transition: "background 0.3s" } }, copied ? "✓ Copied!" : "📋 Copy JSON to Clipboard"),
        ),
        h("div", { style: { background: C.surface, borderRadius: 16, padding: 16, border: `1px solid ${C.border}` } },
          h("div", { style: { fontSize: 11, color: C.textDim, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 } }, "Preview"),
          h("pre", { style: { fontSize: 10, color: C.textDim, overflow: "auto", maxHeight: 300, fontFamily: "'JetBrains Mono'", lineHeight: 1.4 } }, JSON.stringify(data, null, 2).slice(0, 2000)),
        ),
      );
    }

    // --- Mount ---
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

    // --- Service Worker: nuke old, register new ---
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          // First: unregister any existing SWs (kills the old cache-first one)
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) {
            await r.unregister();
          }
          // Clear old caches
          const keys = await caches.keys();
          for (const k of keys) {
            if (k.startsWith("repvault-")) await caches.delete(k);
          }
          // Now register fresh
          const reg = await navigator.serviceWorker.register("sw.js");
          reg.update();
        } catch(e) {
          console.log("SW setup:", e);
        }
      });
    }
  </script>

</body>
</html>
